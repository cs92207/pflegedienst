<ion-content [fullscreen]="true">
  <div class="change-password-page">
    <section class="change-password-card glass-panel">
      <span class="section-kicker">Erster Login</span>
      <h1>Lege jetzt dein persönliches Passwort fest.</h1>
      <p>
        Willkommen {{ user?.name || user?.email }}. Aus Sicherheitsgründen ist das Einmal-Passwort nur für die erste Anmeldung gültig.
      </p>

      <form class="change-password-form" (ngSubmit)="submit()">
        <label>
          <span>Aktuelles Passwort</span>
          <input type="password" required [(ngModel)]="currentPassword" name="currentPassword" />
        </label>

        <label>
          <span>Neues Passwort</span>
          <input type="password" required [(ngModel)]="newPassword" name="newPassword" />
        </label>

        <label>
          <span>Neues Passwort wiederholen</span>
          <input type="password" required [(ngModel)]="passwordConfirmation" name="passwordConfirmation" />
        </label>

        <ion-button expand="block" type="submit">Passwort speichern</ion-button>
      </form>
    </section>
  </div>
</ion-content>
