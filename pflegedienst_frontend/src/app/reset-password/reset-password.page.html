<ion-header>
  <ion-toolbar>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <div style="
      position:relative;        /* wichtig, damit das Kind absolut darin positioniert werden kann */
      height:50vh;              /* halbe Bildschirmhöhe */
      background-image:url('assets/images/back.png');
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
  ">
      <!-- Overlay-Container -->
      <div style="
          position:absolute;
          top:50%; left:50%;
          transform:translate(-50%,-50%); /* exakt zentrieren */
          text-align:center;
          color:white;
          padding:1rem 2rem;
          background:rgba(0,0,0,0.4);     /* halbtransparenter Hintergrund für bessere Lesbarkeit */
          border-radius:0.5rem;
      ">
          
      </div>

      <div class="card-outside">
        <ion-card style="margin-top: 128px;">
          <div class="card">
            <div style="width: 200px; height: 200px; margin: 0 auto; display: flex; align-items: center; justify-content: center; background: var(--primary-color); border-radius: 20px; box-shadow: 0 8px 24px rgba(var(--primary-color-rgb), 0.3);">
              <svg width="120" height="120" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="white" opacity="0.2"/>
                <path d="M30 60 L50 30 L70 60" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="50" cy="70" r="6" fill="white"/>
              </svg>
            </div>
            <form>
              <h2>Passwort zurücksetzen</h2>
        
              <br/>
        
              <div class="input-field">
                <label>Neues Passwort</label>
                <input style="background-color: var(--card-color)" required type="password" [(ngModel)]="password" name="password"/>
              </div>
        
              <div class="input-field">
                <label>Passwort wiederholen</label>
                <input style="background-color: var(--card-color)" required type="password" [(ngModel)]="passwordConfirmed" name="passwordConfirmed"/>
              </div>

              <ion-button (click)="resetPassword()">
                Passwort zurücksetzen
              </ion-button>
            </form>
          </div>
        </ion-card>

        <p style="color: black;">Nach dem Zurücksetzen kannst du dich mit dem neuen Passwort anmelden.</p>

      </div>
  </div>

</ion-content>
