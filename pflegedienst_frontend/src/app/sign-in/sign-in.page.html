<ion-content [fullscreen]="true">
  <div class="signin-page" style="margin-top: 128px;">
    <section class="signin-hero">
      <div class="signin-hero__copy">
        <span class="section-kicker">Pflegedienst Plattform</span>
        <h1>Anmeldung</h1>
        <p>
          Benutzerkonten werden ausschließlich durch das Admin-Panel verwaltet. Neue Zugänge erhalten ein
          Einmal-Passwort und legen beim ersten Login direkt ihr persönliches Passwort fest.
        </p>
      </div>

      <div class="signin-card glass-panel">
        <div class="signin-card__logo">
          <svg width="96" height="96" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" fill="white" opacity="0.14"/>
            <path d="M30 60 L50 30 L70 60" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="50" cy="70" r="6" fill="white"/>
          </svg>
        </div>

        <form class="signin-form" (ngSubmit)="signIn()">
          <div>
            <h2>Anmelden</h2>
            <p>Nutze deine vom Administrator freigegebenen Zugangsdaten.</p>
          </div>

          <label class="form-field">
            <span>E-Mail</span>
            <input required type="email" [(ngModel)]="email" name="email" placeholder="name@pflegedienst.de" />
          </label>

          <label class="form-field">
            <span>Passwort</span>
            <input required type="password" [(ngModel)]="password" name="password" placeholder="Passwort eingeben" />
          </label>

          <ion-button expand="block" type="submit">Anmelden</ion-button>
          <button type="button" class="text-link" (click)="forgotPassword()">Passwort zurücksetzen</button>
        </form>
      </div>
    </section>
  </div>
</ion-content>
